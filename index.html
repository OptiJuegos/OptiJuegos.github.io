/* ------------------------ Header ------------------------ */

#header {
background-color: rgba(20, 20, 20, 0.5);

}

.logo {
width: 270px;
height: 45px;
top: 14px;
left: 13px;
position: absolute;
}

#tabContainer {
height: 32px;
margin-top: 90px;
position: absolute;
left: 59px;
transform: none;
display: block;
width: 110 + "px";
margin-top: "96px"
}

.tabButton {
background-color: rgba(0, 0, 0, 0);
color: rgba(255, 255, 255, 1);
width: 180px;
top: 0px;
height: 100%;
margin: 0px 2.5px 8px 2.5px;
border-radius: 4px;
font-size: 18px;
font-weight: 600;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
transition: background-color 0.08s ease-out, box-shadow 0.08s ease-out, transform 0.08s ease-out;
}

.tabButton:hover {
box-shadow: inset 0 0 0 3px rgba(255, 255, 255, 0.02);
}

#socialContainer {
width: 168px;
height: 32px;
top: auto;
right: auto;
bottom: 20px;
left: 64px;
position: absolute;
display: flex;
}
.socialButton {
background-repeat: no-repeat;
background-position: center;
width: 50%;
height: 100%;
transition: 0.1s ease-out;
}
.socialButton:hover {
filter: brightness(80%);
transform: rotate(-7deg) translateY(0.5px);
}
.socialButton:active {
filter: brightness(70%);
}



/* ------------------------ Main window ------------------------ */

#mainContainer {
width: 440px;
height: 575px;
top: 50%;
left: calc(50% + 149px);
position: absolute;
transform: translateY(-50%) translateX(-50%);
}

.box {
background-color: rgba(20, 20, 20, 0.5);

position: absolute;
border-radius: 8px;

}

}
